name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: api/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        id: lint
        run: bun run lint
      - name: Typecheck
        id: typecheck
        run: bun run typecheck

  trigger:
    name: Trigger
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trigger
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: trigger/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        id: lint
        run: bun run lint
      - name: Typecheck
        id: typecheck
        run: bun run typecheck

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
