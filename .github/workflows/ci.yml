name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed siblings
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      trigger: ${{ steps.filter.outputs.trigger }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      marketing: ${{ steps.filter.outputs.marketing }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            trigger:
              - 'trigger/**'
            dashboard:
              - 'dashboard/**'
            marketing:
              - 'marketing/**'
            migrations:
              - 'api/supabase/migrations/**'

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: api/.bun-version
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  trigger:
    name: Trigger
    needs: changes
    if: needs.changes.outputs.trigger == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trigger
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: trigger/.bun-version
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  dashboard:
    name: Dashboard
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: dashboard/.bun-version
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  marketing:
    name: Marketing
    needs: changes
    if: needs.changes.outputs.marketing == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: marketing/.bun-version
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  deploy-dashboard-preview:
    name: Deploy Dashboard Preview
    needs: [changes, dashboard]
    # Skip the preview when there are migrations in the same PR — preview DB hasn't migrated yet.
    if: needs.changes.outputs.dashboard == 'true' && needs.changes.outputs.migrations == 'false'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: dashboard/.bun-version
      - run: bun install --frozen-lockfile

      - name: Link repo to Vercel project
        run: bunx vercel link --project post-for-me-app --scope day-moon --token=$VERCEL_TOKEN --yes

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        run: bunx vercel build --token=$VERCEL_TOKEN

      - name: Deploy
        id: deploy
        run: |
          URL=$(bunx vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Generate dashboard preview snippet
        run: |
          DEPLOY_STATUS="${{ steps.deploy.outcome }}"
          PREVIEW_URL="${{ steps.deploy.outputs.url }}"
          STATUS="⏳"
          LINK="—"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            STATUS="✅"
            LINK="[Preview]($PREVIEW_URL)"
          elif [ "$DEPLOY_STATUS" = "failure" ]; then
            STATUS="❌"
          fi

          echo "| Dashboard | $STATUS | $LINK |" > dashboard-preview.md

      - name: Upload dashboard preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-preview
          path: dashboard/dashboard-preview.md
