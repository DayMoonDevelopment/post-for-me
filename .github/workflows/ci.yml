name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed siblings
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      trigger: ${{ steps.filter.outputs.trigger }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      marketing: ${{ steps.filter.outputs.marketing }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            trigger:
              - 'trigger/**'
            dashboard:
              - 'dashboard/**'
            marketing:
              - 'marketing/**'
            migrations:
              - 'api/supabase/migrations/**'
              - 'api/supabase/seed/**'
              - 'api/supabase/config.toml'

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: api/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        id: lint
        run: bun run lint
      - name: Typecheck
        id: typecheck
        run: bun run typecheck
      - name: Build
        id: build
        run: bun run build

  trigger:
    name: Trigger
    needs: changes
    if: needs.changes.outputs.trigger == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trigger
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: trigger/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        id: lint
        run: bun run lint
      - name: Typecheck
        id: typecheck
        run: bun run typecheck

  dashboard:
    name: Dashboard
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: dashboard/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        id: lint
        run: bun run lint
      - name: Typecheck
        id: typecheck
        run: bun run typecheck
      - name: Build
        id: build
        run: bun run build

  marketing:
    name: Marketing
    needs: changes
    if: needs.changes.outputs.marketing == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: marketing/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        id: lint
        run: bun run lint
      - name: Typecheck
        id: typecheck
        run: bun run typecheck
      - name: Build
        id: build
        run: bun run build

  validate-migrations:
    name: Validate migrations
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        working-directory: api
        run: supabase start
      - name: Apply migrations + seed
        working-directory: api
        run: supabase db reset
      - name: Stop Supabase
        if: always()
        working-directory: api
        run: supabase stop
