name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  notify-start:
    name: Notify Slack — Start
    runs-on: ubuntu-latest
    outputs:
      slack_ts: ${{ steps.notify.outputs.slack_ts }}
      slack_channel_id: ${{ steps.notify.outputs.slack_channel_id }}
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: "#notifications-postforme"
    steps:
      - uses: actions/checkout@v4
      - name: Post initial Slack message
        id: notify
        run: |
          source ./.github/scripts/update_status.sh 🔄 🔄 🔄 🔄 🔄 🔄 🔄
          echo "slack_ts=${SLACK_TS}" >> "$GITHUB_OUTPUT"
          echo "slack_channel_id=${SLACK_CHANNEL_ID}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Precheck — lint + typecheck for every sibling, in parallel.
  #
  # This is the single hard gate at the top of the deploy pipeline. NOTHING
  # downstream (migrate, deploy-api, deploy-trigger, deploy-dashboard,
  # deploy-marketing) runs unless every matrix entry succeeds.
  #
  # Implementation notes:
  #   - One job, fanned out across 4 siblings via `strategy.matrix`. Each entry
  #     runs on its own runner, so all 4 execute in parallel.
  #   - `fail-fast: false` lets every sibling finish even if one fails — devs
  #     see all problems in one CI run instead of fixing them one at a time.
  #   - `if: always()` on the typecheck step ensures it runs even when lint
  #     fails, so a failing PR surfaces both classes of error in one go.
  #   - The job's overall `result` (success | failure | skipped | cancelled)
  #     is what downstream `needs: precheck` checks. If any matrix entry
  #     fails, the job result is `failure` and the whole deploy chain is
  #     skipped by default needs-propagation.
  #   - The Slack thread shows a single "Precheck" row whose emoji reflects
  #     `needs.precheck.result`. Per-sibling, per-step outcomes are visible
  #     in the GitHub Actions UI for debugging.
  # ---------------------------------------------------------------------------
  precheck:
    name: Precheck (${{ matrix.sibling }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sibling: [api, trigger, dashboard, marketing]
    defaults:
      run:
        working-directory: ${{ matrix.sibling }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ${{ matrix.sibling }}/.bun-version
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        if: always()
        run: bun run typecheck

  migrate:
    name: Migrate Database
    needs: [notify-start, precheck]
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    outputs:
      supabase: ${{ steps.supabase.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        working-directory: api
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Apply Supabase migrations
        id: supabase
        working-directory: api
        run: supabase db push

  deploy-api:
    name: Deploy API
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      docker: ${{ steps.docker.outcome }}
      unkey: ${{ steps.unkey.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: ghcr.io/daymoondevelopment/api:${{ github.sha }},ghcr.io/daymoondevelopment/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_RELEASE=${{ github.sha }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Install Unkey CLI
        run: |
          curl -sL https://github.com/unkeyed/unkey/releases/latest/download/unkey_Linux_x86_64.tar.gz | tar xz
          ./unkey --version

      - name: Deploy API to Unkey
        id: unkey
        env:
          UNKEY_ROOT_KEY: ${{ secrets.UNKEY_ROOT_KEY }}
          UNKEY_PROJECT: post-for-me-api
          UNKEY_APP: default
        run: ./unkey deploy --env=production ghcr.io/daymoondevelopment/api:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Railway backup deploy — secondary, non-blocking.
  #
  # Unkey (deploy-api) is the primary host for the API; Railway is a warm
  # backup. This job builds + deploys the API to Railway from source via
  # `railway up` (Railway's own builder). It is deliberately:
  #   - gated on deploy-api, so it only fires after the Unkey deploy succeeds
  #   - absent from deploy-trigger/dashboard/marketing's `needs`, so a slow or
  #     broken Railway build never holds up the rest of the deploy
  #   - continue-on-error, so a Railway failure surfaces in Slack and the job
  #     badge without failing the overall workflow run
  # ---------------------------------------------------------------------------
  deploy-api-railway-backup:
    name: Deploy API to Railway (backup)
    needs: deploy-api
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    outputs:
      railway: ${{ steps.railway.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: api/.bun-version

      - name: Install Railway CLI
        run: bun add -g @railway/cli

      - name: Deploy API to Railway
        id: railway
        env:
          SVC_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service=${{ env.SVC_ID }} --ci

  deploy-trigger:
    name: Deploy Trigger
    needs: deploy-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trigger
    permissions:
      contents: read
    outputs:
      deploy: ${{ steps.deploy.outcome }}
    env:
      TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
      TRIGGER_PROJECT_ID: ${{ secrets.TRIGGER_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: trigger/.bun-version
      - run: bun install --frozen-lockfile
      - name: 🚀 Deploy Trigger.dev
        id: deploy
        # The `trigger.dev` CLI package is not in trigger/package.json (only
        # @trigger.dev/sdk and @trigger.dev/build are). Invoke via bunx so it's
        # fetched on demand instead of expecting it on PATH or in node_modules/.bin.
        run: bunx trigger.dev@4.4.4 deploy

  deploy-dashboard:
    name: Deploy Dashboard
    needs: deploy-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    permissions:
      contents: read
    outputs:
      vercel: ${{ steps.vercel.outcome }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: dashboard/.bun-version
      # Vercel CLI's `vercel build` spawns `bun` via child_process and only
      # searches system PATH (not $GITHUB_PATH-injected dirs). Symlink so it resolves.
      - name: Symlink bun for Vercel CLI
        run: sudo ln -sf "$(which bun)" /usr/local/bin/bun
      - run: bun install --frozen-lockfile
      - name: Link Dashboard to Vercel project
        run: bunx vercel link --project post-for-me-app --scope day-moon --token=$VERCEL_TOKEN --yes
      - name: Pull Vercel environment (production)
        run: bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build with Vercel
        run: bunx vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy Dashboard to Vercel
        id: vercel
        run: bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --yes

  deploy-marketing:
    name: Deploy Marketing
    needs: deploy-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing
    permissions:
      contents: read
    outputs:
      vercel: ${{ steps.vercel.outcome }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: marketing/.bun-version
      # Vercel CLI's `vercel build` spawns `bun` via child_process and only
      # searches system PATH (not $GITHUB_PATH-injected dirs). Symlink so it resolves.
      - name: Symlink bun for Vercel CLI
        run: sudo ln -sf "$(which bun)" /usr/local/bin/bun
      - run: bun install --frozen-lockfile
      - name: Link Marketing to Vercel project
        run: bunx vercel link --project post-for-me-marketing --scope day-moon --token=$VERCEL_TOKEN --yes
      - name: Pull Vercel environment (production)
        run: bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build with Vercel
        run: bunx vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy Marketing to Vercel
        id: vercel
        run: bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --yes

  notify-final:
    name: Notify Slack — Final
    needs: [notify-start, precheck, migrate, deploy-api, deploy-api-railway-backup, deploy-trigger, deploy-dashboard, deploy-marketing]
    if: always()
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: "#notifications-postforme"
      SLACK_TS: ${{ needs.notify-start.outputs.slack_ts }}
      SLACK_CHANNEL_ID: ${{ needs.notify-start.outputs.slack_channel_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Slack with final status
        run: |
          status() {
            case "$1" in
              success) echo "🚀" ;;
              failure) echo "❌" ;;
              skipped|"") echo "⏸️" ;;
              *)        echo "⏸️" ;;
            esac
          }

          PRECHECK_STATUS=$(status "${{ needs.precheck.result }}")
          SUPABASE_STATUS=$(status "${{ needs.migrate.outputs.supabase }}")
          TRIGGER_STATUS=$(status "${{ needs.deploy-trigger.outputs.deploy }}")
          API_STATUS=$(status "${{ needs.deploy-api-railway-backup.outputs.railway }}")
          UNKEY_STATUS=$(status "${{ needs.deploy-api.outputs.unkey }}")
          DASHBOARD_STATUS=$(status "${{ needs.deploy-dashboard.outputs.vercel }}")
          MARKETING_STATUS=$(status "${{ needs.deploy-marketing.outputs.vercel }}")

          ./.github/scripts/update_status.sh "$PRECHECK_STATUS" "$SUPABASE_STATUS" "$TRIGGER_STATUS" "$API_STATUS" "$UNKEY_STATUS" "$DASHBOARD_STATUS" "$MARKETING_STATUS"
