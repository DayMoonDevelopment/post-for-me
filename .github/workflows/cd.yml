name: CD

on:
  push:
    branches:
      - main
      - feat/ghcr-docker-build

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Full App
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SLACK_CHANNEL: "#notifications-postforme"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: Notify Slack - Start
      #   run: ./.github/scripts/update_status.sh 🔄 🔄 🔄 🔄 🔄 🔄 🔄
      #   env:
      #     SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      #     SLACK_CHANNEL: ${{ env.SLACK_CHANNEL }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install

      - name: Lint
        id: lint
        run: bun run lint

      - name: Type check
        id: typecheck
        run: bun run typecheck

      # - name: Set up Supabase CLI
      #   uses: supabase/setup-cli@v1
      #   with:
      #     version: latest
      #
      # - name: Link Supabase project
      #   run: supabase link --project-ref $SUPABASE_PROJECT_ID
      #
      # - name: Apply Supabase migrations
      #   id: supabase
      #   run: supabase db push
      #
      # - name: 🚀 Deploy Trigger.dev
      #   id: trigger
      #   env:
      #     TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
      #     TRIGGER_PROJECT_ID: ${{ secrets.TRIGGER_PROJECT_ID }}
      #   run: bunx trigger.dev@4.3.0 deploy
      #
      # - name: Install Railway CLI
      #   run: bun add -g @railway/cli

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }},ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Unkey CLI
        run: |
          curl -sL https://github.com/unkeyed/unkey/releases/latest/download/unkey_Linux_x86_64.tar.gz | tar xz
          ./unkey --version

      - name: Deploy API to Unkey
        id: todo
        env:
          UNKEY_ROOT_KEY: ${{ secrets.UNKEY_ROOT_KEY }}
          UNKEY_PROJECT: proj_cno39ZziD3zd # change this
          UNKEY_APP: default # leave this as is until we allow multiple apps per project
        run: ./unkey deploy --env=production ghcr.io/${{ github.repository }}/api:${{ github.sha }}

