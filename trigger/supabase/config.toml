# Minimal Supabase CLI config for trigger.
# The DB schema, migrations, and seed live in api/supabase/. This sibling only
# uses the CLI to read types from the running local instance.
#
# Workflow:
#   1. Start the local stack from api/:  cd api && bun run supabase:start
#   2. Regenerate types in trigger:      cd trigger && bun run supabase:typegen
project_id = "post-for-me"

[db]
port = 54322
